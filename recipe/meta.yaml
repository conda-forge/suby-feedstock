{% set name = "suby" %}
{% set version = "0.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/suby-{{ version }}.tar.gz
  sha256: fdd94581b0f7169ba6451cb163dfff96bd5e83011c4f30b7335dc61e15a8d1b3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools ==68.0.0
    - pip
  run:
    - python >={{ python_min }}
    - emptylog >=0.0.7
    - cantok >=0.0.24

test:
  imports:
    - suby
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pomponchik/suby
  summary: Slightly simplified subprocesses
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
