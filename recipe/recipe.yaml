schema_version: 1

context:
  name: suby
  version: "0.0.6"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/suby-${{ version }}.tar.gz
  sha256: 729901a2489ef73f0fd4cb4030bd21827eb0614866907507c70c93321e71511f

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools ==68.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - emptylog >=0.0.12
    - cantok >=0.0.36
    - microbenchmark >=0.0.2

tests:
  - python:
      imports:
        - suby
      pip_check: true
      python_version:
        - ${{ python_min }}
        - "*"

about:
  summary: Slightly simplified subprocesses
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/pomponchik/suby

extra:
  recipe-maintainers:
    - thewchan
